services:
  postgres:
    image: postgres:16-alpine
    container_name: citeseer-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-siteseer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-siteseer}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-siteseer}']
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
